<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙鹏作品集</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0a0e17;
            color: #e0e6ed;
            line-height: 1.6;
        }

        /* Header */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f35 50%, #0a0e17 100%);
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0, 255, 200, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 150, 255, 0.08) 0%, transparent 50%);
            animation: glow 8s ease-in-out infinite alternate;
        }

        @keyframes glow {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 200, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 200, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(60px); }
        }

        .header-content {
            text-align: center;
            z-index: 1;
        }

        .subtitle {
            font-size: 13px;
            letter-spacing: 8px;
            color: #00ffc8;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-family: 'Orbitron', sans-serif;
        }

        h1 {
            font-size: 56px;
            font-weight: 300;
            letter-spacing: 12px;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #fff, #00ffc8, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 14px;
            color: #6b7c93;
            letter-spacing: 2px;
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: #3d5a80;
            font-size: 11px;
            letter-spacing: 2px;
            animation: fadeInUp 1s ease 1s both;
        }

        .scroll-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, #00ffc8, transparent);
            animation: scrollLine 2s ease-in-out infinite;
        }

        @keyframes scrollLine {
            0%, 100% { transform: scaleY(1); opacity: 1; }
            50% { transform: scaleY(0.5); opacity: 0.5; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Gallery Section */
        .gallery-section {
            padding: 100px 60px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 255, 200, 0.2);
        }

        .section-title {
            font-size: 13px;
            letter-spacing: 4px;
            color: #00ffc8;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }

        .work-count {
            font-size: 12px;
            color: #4a5568;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #1a2339 0%, #0d1320 100%);
            border: 1px solid rgba(0, 255, 200, 0.1);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .gallery-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 200, 0.1), transparent);
            transition: left 0.5s;
        }

        .gallery-item:hover::before {
            left: 100%;
        }

        .gallery-item::after {
            content: '';
            display: block;
            padding-bottom: 75%;
        }

        .gallery-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            filter: brightness(0.9) contrast(1.1);
        }

        .gallery-item:hover {
            border-color: rgba(0, 255, 200, 0.4);
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.15);
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .gallery-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(10, 14, 23, 0.95), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .gallery-item .work-number {
            color: #00ffc8;
            font-size: 12px;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
        }

        /* Video Grid */
        .video-gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 40px;
        }

        .video-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background: linear-gradient(135deg, #1a2339 0%, #0d1320 100%);
            border: 1px solid rgba(0, 255, 200, 0.1);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .video-item::after {
            content: '';
            display: block;
            padding-bottom: 56.25%;
        }

        .video-item video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .video-item:hover {
            border-color: rgba(0, 255, 200, 0.4);
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.15);
        }

        .video-item:hover video {
            transform: scale(1.05);
        }

        .video-item .video-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 15px;
            background: linear-gradient(to top, rgba(10, 14, 23, 0.95), transparent);
            z-index: 2;
        }

        .video-item .video-title {
            color: #00ffc8;
            font-size: 12px;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 8, 15, 0.98);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 85%;
            max-height: 85vh;
        }

        .lightbox img,
        .lightbox video {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 0 60px rgba(0, 255, 200, 0.2);
        }

        .lightbox video {
            background: #000;
        }

        .lightbox .close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 32px;
            color: rgba(0, 255, 200, 0.6);
            cursor: pointer;
            transition: color 0.3s;
            font-family: sans-serif;
        }

        .lightbox .close:hover {
            color: #00ffc8;
        }

        .lightbox .nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 36px;
            color: rgba(0, 255, 200, 0.4);
            cursor: pointer;
            padding: 30px 25px;
            transition: all 0.3s;
            user-select: none;
            font-family: sans-serif;
        }

        .lightbox .nav:hover {
            color: #00ffc8;
            background: rgba(0, 255, 200, 0.05);
        }

        .lightbox .prev { left: 20px; }
        .lightbox .next { right: 20px; }

        .lightbox .counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 200, 0.5);
            font-size: 13px;
            letter-spacing: 3px;
            font-family: 'Orbitron', sans-serif;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 80px 20px;
            border-top: 1px solid rgba(0, 255, 200, 0.1);
            margin-top: 60px;
        }

        footer p {
            font-size: 12px;
            color: #4a5568;
            letter-spacing: 2px;
        }

        footer a {
            color: #00ffc8;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }

        footer a:hover {
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 255, 200, 0.5);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .gallery { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 900px) {
            .video-gallery { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .gallery { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .video-gallery { grid-template-columns: 1fr; }
            .gallery-section { padding: 60px 20px; }
            h1 { font-size: 36px; letter-spacing: 6px; }
            header { height: 70vh; }
        }

        @media (max-width: 480px) {
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="grid-bg"></div>
        <div class="header-content">
            <div class="subtitle">Portfolio</div>
            <h1>龙鹏作品集</h1>
            <div class="tagline">UI Design &amp; Motion Design</div>
        </div>
        <div class="scroll-hint">
            <span>向下滚动</span>
            <div class="scroll-line"></div>
        </div>
    </header>

    <section class="gallery-section">
        <div class="section-header">
            <div class="section-title">设计作品</div>
            <div class="work-count">46 Works</div>
        </div>
        <div class="gallery" id="gallery"></div>

        <div class="section-header" style="margin-top: 80px;">
            <div class="section-title">动效作品</div>
            <div class="work-count">10 Works</div>
        </div>

        <div class="video-gallery" id="videoGallery">
            <div class="video-item" data-index="46">
                <video src="动效文件/01_国金证券登录页.mp4" muted loop autoplay preload="metadata"></video>
                <div class="video-label"><span class="video-title">国金证券登录页</span></div>
            </div>
            <div class="video-item" data-index="47">
                <video src="动效文件/02_天威云动态插画.mp4" muted loop autoplay preload="metadata"></video>
                <div class="video-label"><span class="video-title">天威云动态插画</span></div>
            </div>
            <div class="video-item" data-index="48">
                <video src="动效文件/03_签署不指定位置.mp4" muted loop autoplay preload="metadata"></video>
                <div class="video-label"><span class="video-title">签署不指定位置</span></div>
            </div>
            <div class="video-item" data-index="49">
                <video src="动效文件/04_批量移动初次登录提示.mp4" muted loop autoplay preload="metadata"></video>
                <div class="video-label"><span class="video-title">批量移动初次登录提示</span></div>
            </div>
            <div class="video-item" data-index="50">
                <video src="动效文件/05_下载证书中.mp4" muted loop autoplay preload="metadata"></video>
                <div class="video-label"><span class="video-title">下载证书中</span></div>
            </div>
            <div class="video-item" data-index="51">
                <video src="动效文件/06_美特驾驶舱修.mp4" muted loop autoplay preload="metadata"></video>
                <div class="video-label"><span class="video-title">美特驾驶舱</span></div>
            </div>
            <div class="video-item" data-index="52">
                <video src="动效文件/07_禁毒登录动效.mp4" muted loop autoplay preload="metadata"></video>
                <div class="video-label"><span class="video-title">禁毒登录动效</span></div>
            </div>
            <div class="video-item" data-index="53">
                <video src="动效文件/08_猎空大登录页.mp4" muted loop autoplay preload="metadata"></video>
                <div class="video-label"><span class="video-title">猎空大登录页</span></div>
            </div>
            <div class="video-item" data-index="54">
                <video src="动效文件/09_诸暨产业登录.mp4" muted loop autoplay preload="metadata"></video>
                <div class="video-label"><span class="video-title">诸暨产业登录</span></div>
            </div>
            <div class="video-item" data-index="55">
                <video src="动效文件/10_深圳宝安首页.mp4" muted loop autoplay preload="metadata"></video>
                <div class="video-label"><span class="video-title">深圳宝安首页</span></div>
            </div>
        </div>
    </section>

    <div class="lightbox" id="lightbox">
        <span class="close" id="close">&times;</span>
        <span class="nav prev" id="prev">&#10094;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <video id="lightbox-video" src="" controls style="display:none;"></video>
        </div>
        <span class="nav next" id="next">&#10095;</span>
        <div class="counter" id="counter"></div>
    </div>

    <footer>
        <p>龙鹏作品集 &copy; 2026 &nbsp;|&nbsp; <a href="https://rocof.github.io/username.github.io/" target="_blank">更多动效内容 →</a></p>
    </footer>

    <script>
        const imageUrls = [
            'https://i.postimg.cc/2jDxWj4C/00.png',
            'https://i.postimg.cc/3751V1zs/01.png',
            'https://i.postimg.cc/Mx25N5gg/02.png',
            'https://i.postimg.cc/6wJcgcDs/03.png',
            'https://i.postimg.cc/DFk6H6RQ/04.png',
            'https://i.postimg.cc/jK0cmcGY/05.png',
            'https://i.postimg.cc/51dgTgZ1/06.png',
            'https://i.postimg.cc/ZZtH2H1J/07.png',
            'https://i.postimg.cc/DFr6TsKD/08.png',
            'https://i.postimg.cc/ty3kjPjQ/09.png',
            'https://i.postimg.cc/R97dBfBM/10.png',
            'https://i.postimg.cc/2mQGDvD5/11.png',
            'https://i.postimg.cc/yBmjH9HW/12.png',
            'https://i.postimg.cc/Sq6dh8hY/13.png',
            'https://i.postimg.cc/b8xghbht/14.png',
            'https://i.postimg.cc/cZRhSYSY/15.png',
            'https://i.postimg.cc/0P9f2Qkj/16.png',
            'https://i.postimg.cc/wg9VTvqt/17.png',
            'https://i.postimg.cc/Qhjbxt89/18.png',
            'https://i.postimg.cc/2rCw86kF/19.png',
            'https://i.postimg.cc/1syH5tmr/20.png',
            'https://i.postimg.cc/0P9f2QkC/21.png',
            'https://i.postimg.cc/fDMKTLzP/22.png',
            'https://i.postimg.cc/3Y9ZyTNn/23.png',
            'https://i.postimg.cc/tpDz1jJS/24.png',
            'https://i.postimg.cc/3Y9ZyTNs/25.png',
            'https://i.postimg.cc/1sMKgQ4x/26.png',
            'https://i.postimg.cc/8NwbFSsT/27.png',
            'https://i.postimg.cc/q4QGtTgk/28.png',
            'https://i.postimg.cc/cdHBwb80/29.png',
            'https://i.postimg.cc/D7ZPLMbf/30.png',
            'https://i.postimg.cc/QjtJ1yWM/31.png',
            'https://i.postimg.cc/gGJH8T6J/32.png',
            'https://i.postimg.cc/zqBFKcRV/33.png',
            'https://i.postimg.cc/Gb2xG5sy/34.png',
            'https://i.postimg.cc/33cCBFgp/35.png',
            'https://i.postimg.cc/PdRz4Qmy/36.png',
            'https://i.postimg.cc/LmbBT3z7/37.png',
            'https://i.postimg.cc/8T0BHmh9/38.png',
            'https://i.postimg.cc/YpLNyL3X/39.png',
            'https://i.postimg.cc/RMJ1bJR8/40.png',
            'https://i.postimg.cc/PtvbFvyh/41.png',
            'https://i.postimg.cc/dqZRSZ6t/42.png',
            'https://i.postimg.cc/Ng28P2D0/43.png',
            'https://i.postimg.cc/qk6cZ6wz/44.png',
            'https://i.postimg.cc/W2qmfq83/45.png'
        ];

        const images = [];
        for (let i = 0; i < 46; i++) {
            const name = i.toString().padStart(2, '0') + '.png';
            images.push({ type: 'image', src: imageUrls[i], name: name });
        }

        const videos = [
            { type: 'video', src: '动效文件/01_国金证券登录页.mp4', name: '国金证券登录页' },
            { type: 'video', src: '动效文件/02_天威云动态插画.mp4', name: '天威云动态插画' },
            { type: 'video', src: '动效文件/03_签署不指定位置.mp4', name: '签署不指定位置' },
            { type: 'video', src: '动效文件/04_批量移动初次登录提示.mp4', name: '批量移动初次登录提示' },
            { type: 'video', src: '动效文件/05_下载证书中.mp4', name: '下载证书中' },
            { type: 'video', src: '动效文件/06_美特驾驶舱修.mp4', name: '美特驾驶舱' },
            { type: 'video', src: '动效文件/07_禁毒登录动效.mp4', name: '禁毒登录动效' },
            { type: 'video', src: '动效文件/08_猎空大登录页.mp4', name: '猎空大登录页' },
            { type: 'video', src: '动效文件/09_诸暨产业登录.mp4', name: '诸暨产业登录' },
            { type: 'video', src: '动效文件/10_深圳宝安首页.mp4', name: '深圳宝安首页' }
        ];

        const allItems = [...images, ...videos];

        // Build image gallery
        const gallery = document.getElementById('gallery');
        images.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.innerHTML = `
                <img src="${item.src}" alt="${item.name}" loading="lazy">
                <div class="overlay"><span class="work-number">${item.name}</span></div>
            `;
            div.addEventListener('click', () => openLightbox(index));
            gallery.appendChild(div);
        });

        // Video item click handlers
        document.querySelectorAll('.video-item').forEach(item => {
            item.addEventListener('click', (e) => {
                const idx = parseInt(item.dataset.index);
                openLightbox(idx);
            });
        });
        document.querySelectorAll('.video-item video').forEach(vid => {
            vid.addEventListener('click', (e) => {
                e.stopPropagation();
                const item = vid.closest('.video-item');
                const idx = parseInt(item.dataset.index);
                openLightbox(idx);
            });
        });

        // Lightbox
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxVideo = document.getElementById('lightbox-video');
        const counter = document.getElementById('counter');
        let currentIndex = 0;

        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            lightboxVideo.pause();
            document.body.style.overflow = '';
        }

        function updateLightbox() {
            const item = allItems[currentIndex];
            if (item.type === 'image') {
                lightboxImg.src = item.src;
                lightboxImg.style.display = 'block';
                lightboxVideo.style.display = 'none';
                lightboxVideo.src = '';
            } else {
                lightboxVideo.src = item.src;
                lightboxVideo.style.display = 'block';
                lightboxVideo.loop = true;
                lightboxImg.style.display = 'none';
                lightboxImg.src = '';
                lightboxVideo.play();
            }
            counter.textContent = `${String(currentIndex + 1).padStart(2, '0')} / ${allItems.length}`;
        }

        function showPrev() {
            currentIndex = (currentIndex - 1 + allItems.length) % allItems.length;
            updateLightbox();
        }

        function showNext() {
            currentIndex = (currentIndex + 1) % allItems.length;
            updateLightbox();
        }

        document.getElementById('close').addEventListener('click', closeLightbox);
        document.getElementById('prev').addEventListener('click', showPrev);
        document.getElementById('next').addEventListener('click', showNext);
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) closeLightbox();
        });
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') showPrev();
            if (e.key === 'ArrowRight') showNext();
        });
    </script>
</body>
</html>
